<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>TypstUML — Playground</title>
<style>
  :root {
    --bg: #f6f7f9;
    --panel: #ffffff;
    --border: #e2e4e8;
    --text: #1c1e21;
    --muted: #6b7280;
    --accent: #3b5bdb;
    --error-bg: #fff5f5;
    --error-fg: #c92a2a;
    --error-border: #ffc9c9;
  }
  * { box-sizing: border-box; }
  html, body { height: 100%; margin: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
    display: flex;
    flex-direction: column;
  }
  header {
    flex: 0 0 auto;
    display: flex;
    align-items: center;
    gap: 16px;
    padding: 10px 16px;
    background: var(--panel);
    border-bottom: 1px solid var(--border);
  }
  header h1 {
    font-size: 15px;
    margin: 0;
    font-weight: 600;
  }
  header .spacer { flex: 1; }
  header label { font-size: 13px; color: var(--muted); }
  select, button {
    font: inherit;
    font-size: 13px;
    padding: 5px 9px;
    border: 1px solid var(--border);
    border-radius: 6px;
    background: var(--panel);
    color: var(--text);
    cursor: pointer;
  }
  button.primary {
    background: var(--accent);
    border-color: var(--accent);
    color: #fff;
  }
  button:disabled {
    opacity: 0.4;
    cursor: not-allowed;
  }
  #status {
    font-size: 12px;
    color: var(--muted);
    min-width: 90px;
  }
  .zoom {
    display: inline-flex;
    align-items: center;
    gap: 4px;
  }
  .zoom button {
    width: 28px;
    padding: 5px 0;
    font-size: 15px;
    line-height: 1;
  }
  #zoomLabel {
    font-size: 12px;
    color: var(--muted);
    min-width: 40px;
    text-align: center;
  }
  main {
    flex: 1 1 auto;
    display: flex;
    min-height: 0;
  }
  .pane {
    flex: 1 1 50%;
    display: flex;
    flex-direction: column;
    min-width: 0;
  }
  .pane + .pane { border-left: 1px solid var(--border); }
  .pane-head {
    flex: 0 0 auto;
    padding: 6px 12px;
    font-size: 12px;
    font-weight: 600;
    color: var(--muted);
    background: var(--panel);
    border-bottom: 1px solid var(--border);
    text-transform: uppercase;
    letter-spacing: 0.04em;
  }
  #editor {
    flex: 1 1 auto;
    width: 100%;
    border: 0;
    resize: none;
    padding: 14px 16px;
    font-family: "SF Mono", "JetBrains Mono", Menlo, Consolas, monospace;
    font-size: 13px;
    line-height: 1.55;
    tab-size: 2;
    outline: none;
    background: var(--panel);
    color: var(--text);
  }
  #output {
    flex: 1 1 auto;
    position: relative;
    overflow: auto;
    padding: 20px;
    background:
      repeating-conic-gradient(#eef0f3 0% 25%, transparent 0% 50%)
      50% / 20px 20px;
  }
  #output svg,
  #output img {
    display: block;
    margin: 0 auto;
    width: var(--zoom, 100%);
    height: auto;
  }
  /* PDF: ditch padding + checkerboard, let the browser's PDF viewer fill the
     pane (it has its own zoom UI, so our zoom buttons are disabled). */
  #output.pdf-mode {
    padding: 0;
    background: #fff;
  }
  #output iframe {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    border: 0;
    background: #fff;
  }
  #error {
    flex: 0 0 auto;
    display: none;
    white-space: pre-wrap;
    font-family: "SF Mono", Menlo, Consolas, monospace;
    font-size: 12px;
    padding: 10px 16px;
    background: var(--error-bg);
    color: var(--error-fg);
    border-top: 1px solid var(--error-border);
    max-height: 30%;
    overflow: auto;
  }
</style>
</head>
<body>
<header>
  <h1>TypstUML</h1>
  <label for="examples">Example</label>
  <select id="examples">
    <option value="json">JSON</option>
    <option value="yaml">YAML</option>
    <option value="sequence">Sequence</option>
    <option value="wbs">WBS</option>
    <option value="mindmap">Mind map</option>
  </select>
  <label for="format">Format</label>
  <select id="format">
    <option value="svg">SVG</option>
    <option value="png">PNG</option>
    <option value="pdf">PDF</option>
  </select>
  <div class="spacer"></div>
  <span id="status">loading…</span>
  <span class="zoom">
    <button id="zoomOut" title="Zoom out">−</button>
    <span id="zoomLabel">100%</span>
    <button id="zoomIn" title="Zoom in">+</button>
  </span>
  <button id="download">Download SVG</button>
  <button id="render" class="primary">Render</button>
</header>

<main>
  <section class="pane">
    <div class="pane-head">PlantUML source</div>
    <textarea id="editor" spellcheck="false"></textarea>
  </section>
  <section class="pane">
    <div class="pane-head">Rendered diagram</div>
    <div id="output"></div>
    <pre id="error"></pre>
  </section>
</main>

<script type="module">
// `./build.sh` writes ./pkg/ next to this file (cargo + wasm-bindgen + wasm-opt).
// The default export is the module loader; named exports are our bindings.
import init, { renderSvg, renderPng, renderPdf } from "./pkg/typstuml_wasm.js";

const EXAMPLES = {
  json: `@startjson
{
  "project": "TypstUML",
  "language": "Rust",
  "targets": ["native", "wasm"],
  "offline": true
}
@endjson`,
  yaml: `@startyaml
project: TypstUML
pipeline:
  - parser
  - ir
  - codegen
  - runtime
formats: [svg, pdf, png]
@endyaml`,
  sequence: `@startuml
Alice -> Bob: Authentication Request
Bob --> Alice: Authentication Response
Alice -> Bob: Another request
Bob --> Alice: Another response
@enduml`,
  wbs: `@startwbs
* TypstUML
** Parser
*** PlantUML scanner
*** Dispatcher
** Codegen
** Runtime
*** Typst world
*** SVG / PDF / PNG
@endwbs`,
  mindmap: `@startmindmap
* Diagram types
** Sequence
** JSON
** YAML
** WBS
** Mind map
@endmindmap`,
};

const FORMAT_META = {
  svg: { mime: "image/svg+xml", ext: "svg" },
  png: { mime: "image/png",      ext: "png" },
  pdf: { mime: "application/pdf", ext: "pdf" },
};

const editor = document.getElementById("editor");
const output = document.getElementById("output");
const errorBox = document.getElementById("error");
const statusEl = document.getElementById("status");
const examplesEl = document.getElementById("examples");
const formatEl = document.getElementById("format");
const renderBtn = document.getElementById("render");
const downloadBtn = document.getElementById("download");
const zoomOutBtn = document.getElementById("zoomOut");
const zoomInBtn = document.getElementById("zoomIn");
const zoomLabel = document.getElementById("zoomLabel");

let ready = false;
// Last successful render — `data` is a string for SVG, Uint8Array for PNG/PDF.
let lastOutput = null;
// Object-URL for the most recent <img>/<iframe>; revoked on each new render.
let lastBlobUrl = null;

function setStatus(text, busy = false) {
  statusEl.textContent = text;
  statusEl.style.color = busy ? "var(--accent)" : "var(--muted)";
}

function updateDownloadLabel() {
  downloadBtn.textContent = "Download " + formatEl.value.toUpperCase();
  downloadBtn.disabled = !lastOutput;
}

function clearBlobUrl() {
  if (lastBlobUrl) {
    URL.revokeObjectURL(lastBlobUrl);
    lastBlobUrl = null;
  }
}

function showOutput(format, data) {
  clearBlobUrl();
  output.classList.toggle("pdf-mode", format === "pdf");
  // Zoom only meaningfully applies to SVG/PNG — PDF iframes have their own UI.
  zoomOutBtn.disabled = zoomInBtn.disabled = (format === "pdf");

  if (format === "svg") {
    output.innerHTML = data;
  } else {
    const { mime } = FORMAT_META[format];
    const blob = new Blob([data], { type: mime });
    lastBlobUrl = URL.createObjectURL(blob);
    output.innerHTML = format === "png"
      ? `<img src="${lastBlobUrl}" alt="rendered diagram">`
      : `<iframe src="${lastBlobUrl}" title="PDF preview"></iframe>`;
  }
}

function render() {
  if (!ready) return;
  const source = editor.value;
  const format = formatEl.value;
  setStatus("rendering…", true);
  // Yield once so the status text actually paints before the (possibly
  // multi-second) wasm call blocks the main thread.
  requestAnimationFrame(() => {
    try {
      let data;
      if (format === "svg") data = renderSvg(source);
      else if (format === "png") data = renderPng(source);
      else if (format === "pdf") data = renderPdf(source);
      lastOutput = { format, data };
      showOutput(format, data);
      errorBox.style.display = "none";
      setStatus("rendered");
    } catch (err) {
      errorBox.textContent = String(err.message ?? err);
      errorBox.style.display = "block";
      setStatus("error");
    }
    updateDownloadLabel();
  });
}

// Debounced auto-render while typing.
let timer = null;
function scheduleRender() {
  setStatus("typing…", true);
  clearTimeout(timer);
  timer = setTimeout(render, 400);
}

editor.addEventListener("input", scheduleRender);
renderBtn.addEventListener("click", render);
formatEl.addEventListener("change", render);

// Zoom: the rendered SVG/PNG is sized to `--zoom`% of the output pane's width,
// so 100% fills the pane and anything larger scrolls.
const ZOOM_STEPS = [25, 50, 75, 100, 150, 200, 300, 400];
let zoomIdx = 3; // 100%
function applyZoom() {
  const z = ZOOM_STEPS[zoomIdx];
  output.style.setProperty("--zoom", z + "%");
  zoomLabel.textContent = z + "%";
}
zoomOutBtn.addEventListener("click", () => {
  zoomIdx = Math.max(0, zoomIdx - 1);
  applyZoom();
});
zoomInBtn.addEventListener("click", () => {
  zoomIdx = Math.min(ZOOM_STEPS.length - 1, zoomIdx + 1);
  applyZoom();
});
applyZoom();

examplesEl.addEventListener("change", () => {
  editor.value = EXAMPLES[examplesEl.value];
  render();
});

downloadBtn.addEventListener("click", () => {
  if (!lastOutput) return;
  const { format, data } = lastOutput;
  const { mime, ext } = FORMAT_META[format];
  const blob = new Blob([data], { type: mime });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = "diagram." + ext;
  a.click();
  URL.revokeObjectURL(url);
});

editor.value = EXAMPLES.json;
updateDownloadLabel();

init()
  .then(() => {
    ready = true;
    render();
  })
  .catch((err) => {
    setStatus("load failed");
    errorBox.textContent =
      "Failed to load the wasm module.\n" +
      "Build it first:  ./build.sh\n" +
      "and serve this directory over HTTP (not file://).\n\n" +
      String(err);
    errorBox.style.display = "block";
  });
</script>
</body>
</html>
