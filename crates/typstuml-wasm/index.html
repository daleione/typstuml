<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>TypstUML — Playground</title>
<style>
  :root {
    --bg: #f6f7f9;
    --panel: #ffffff;
    --border: #e2e4e8;
    --text: #1c1e21;
    --muted: #6b7280;
    --accent: #3b5bdb;
    --ok: #2f9e44;
    --error-bg: #fff5f5;
    --error-fg: #c92a2a;
    --error-border: #ffc9c9;
  }
  * { box-sizing: border-box; }
  html, body { height: 100%; margin: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
    display: flex;
    flex-direction: column;
  }

  /* Slim header — just title, example picker, and status. Format / zoom /
     fonts / download all live in the floating toolbar inside the preview. */
  header {
    flex: 0 0 auto;
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 9px 16px;
    background: var(--panel);
    border-bottom: 1px solid var(--border);
  }
  header h1 {
    font-size: 14px;
    margin: 0;
    font-weight: 600;
    letter-spacing: 0.01em;
  }
  header h1 .accent { color: var(--accent); }
  header .spacer { flex: 1; }
  header label { font-size: 13px; color: var(--muted); }
  #status {
    font-size: 12px;
    color: var(--muted);
    display: inline-flex;
    align-items: center;
    gap: 6px;
    min-width: 80px;
  }
  #status::before {
    content: "";
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: currentColor;
    opacity: 0.85;
  }
  #status[data-state="busy"] { color: var(--accent); }
  #status[data-state="ok"] { color: var(--ok); }
  #status[data-state="error"] { color: var(--error-fg); }

  /* Default form controls. The toolbar buttons override most of this. */
  select, button {
    font: inherit;
    font-size: 13px;
    padding: 5px 9px;
    border: 1px solid var(--border);
    border-radius: 6px;
    background: var(--panel);
    color: var(--text);
    cursor: pointer;
  }
  select:focus, button:focus { outline: 2px solid rgba(59, 91, 219, 0.25); outline-offset: 1px; }
  button:disabled { opacity: 0.4; cursor: not-allowed; }

  /* Main layout — editor left, preview right; both stretch to fill. */
  main {
    flex: 1 1 auto;
    display: flex;
    min-height: 0;
  }
  .pane {
    flex: 1 1 50%;
    display: flex;
    flex-direction: column;
    min-width: 0;
    position: relative;
  }
  .pane + .pane { border-left: 1px solid var(--border); }
  #editor {
    flex: 1 1 auto;
    width: 100%;
    border: 0;
    resize: none;
    padding: 16px 18px;
    font-family: "SF Mono", "JetBrains Mono", Menlo, Consolas, monospace;
    font-size: 13px;
    line-height: 1.55;
    tab-size: 2;
    outline: none;
    background: var(--panel);
    color: var(--text);
  }
  #output {
    flex: 1 1 auto;
    position: relative;
    overflow: auto;
    padding: 20px;
    /* Leave room for the floating toolbar so very tall diagrams don't sit
       behind it. */
    padding-bottom: 70px;
    background:
      repeating-conic-gradient(#eef0f3 0% 25%, transparent 0% 50%)
      50% / 20px 20px;
  }
  #output svg,
  #output img {
    display: block;
    margin: 0 auto;
    width: var(--zoom, 100%);
    height: auto;
  }
  /* PDF: ditch padding + checkerboard, let the browser's PDF viewer fill the
     pane (it has its own zoom UI, so our zoom buttons are disabled). */
  #output.pdf-mode { padding: 0; background: #fff; }
  #output iframe {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    border: 0;
    background: #fff;
  }
  #error {
    flex: 0 0 auto;
    display: none;
    white-space: pre-wrap;
    font-family: "SF Mono", Menlo, Consolas, monospace;
    font-size: 12px;
    padding: 10px 16px;
    background: var(--error-bg);
    color: var(--error-fg);
    border-top: 1px solid var(--error-border);
    max-height: 30%;
    overflow: auto;
  }

  /* Floating toolbar — glass pill anchored to bottom-center of the preview
     pane. Sits above whatever's in #output (including the PDF iframe). */
  #toolbar {
    position: absolute;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 5;
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 7px 10px;
    background: rgba(255, 255, 255, 0.85);
    backdrop-filter: blur(16px) saturate(140%);
    -webkit-backdrop-filter: blur(16px) saturate(140%);
    border: 1px solid rgba(0, 0, 0, 0.06);
    border-radius: 13px;
    box-shadow:
      0 14px 32px rgba(15, 23, 42, 0.12),
      0 1px 0 rgba(255, 255, 255, 0.7) inset;
  }
  #toolbar button {
    background: transparent;
    border: 0;
    padding: 6px 12px;
    border-radius: 7px;
    color: var(--text);
    font-size: 13px;
    line-height: 1.4;
  }
  #toolbar button:hover:not(:disabled) { background: rgba(0, 0, 0, 0.05); }
  #toolbar button:focus { outline: none; box-shadow: 0 0 0 2px rgba(59, 91, 219, 0.35); }
  #toolbar .divider {
    width: 1px;
    height: 22px;
    background: rgba(0, 0, 0, 0.08);
    margin: 0 3px;
  }
  /* Format toggle — segmented control: SVG / PNG / PDF. Active = solid
     accent blue so the current output format is obvious at a glance.
     Selectors are prefixed with `#toolbar` to outweigh the generic
     `#toolbar button { background: transparent; ... }` reset above —
     class-only selectors lose specificity to the id-prefixed default. */
  #toolbar .format-group {
    display: inline-flex;
    background: rgba(0, 0, 0, 0.04);
    border-radius: 8px;
    padding: 2px;
    gap: 2px;
  }
  #toolbar .format-group button {
    padding: 5px 13px;
    font-weight: 500;
    color: var(--muted);
    font-size: 13px;
    background: transparent;
  }
  #toolbar .format-group button.active,
  #toolbar .format-group button.active:hover {
    background: var(--accent);
    color: #fff;
    box-shadow: 0 1px 2px rgba(59, 91, 219, 0.25);
  }
  #toolbar .format-group button:hover:not(.active):not(:disabled) {
    color: var(--text);
    background: rgba(0, 0, 0, 0.04);
  }

  /* PNG scale picker — native <select> styled to fit the toolbar. Only
     visible when PNG is the active format; the `[hidden]` attribute on the
     element itself gives `display: none` for free. */
  #toolbar #pngScale {
    appearance: none;
    -webkit-appearance: none;
    background: rgba(0, 0, 0, 0.04);
    background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='10' height='6' viewBox='0 0 10 6'><path fill='%236b7280' d='M0 0 L5 6 L10 0 Z'/></svg>");
    background-repeat: no-repeat;
    background-position: right 8px center;
    border: 0;
    border-radius: 7px;
    padding: 5px 22px 5px 11px;
    font-size: 13px;
    color: var(--text);
    cursor: pointer;
  }
  #toolbar #pngScale:hover { background-color: rgba(0, 0, 0, 0.07); }

  /* Zoom controls — minus / percent / plus. */
  #toolbar .zoom {
    display: inline-flex;
    align-items: center;
    gap: 0;
  }
  #toolbar .zoom button {
    width: 28px;
    padding: 4px 0;
    font-size: 15px;
    line-height: 1;
  }
  #zoomLabel {
    font-size: 13px;
    color: var(--muted);
    min-width: 44px;
    text-align: center;
    user-select: none;
  }

  /* Popovers anchored above toolbar buttons (Fonts list, Download menu). */
  .popover-anchor { position: relative; }
  .popover {
    display: none;
    position: absolute;
    bottom: calc(100% + 10px);
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 10px;
    box-shadow: 0 16px 36px rgba(0, 0, 0, 0.14);
    z-index: 20;
  }
  .popover.open { display: block; }

  /* Fonts popover — wide list with progress bars. */
  #fontsPopover {
    right: 0;
    width: 320px;
    padding: 10px 12px;
  }
  #fontsPopover h3 {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.04em;
    color: var(--muted);
    margin: 8px 0 4px;
    font-weight: 600;
  }
  #fontsPopover h3:first-child { margin-top: 0; }
  .font-item {
    display: flex;
    align-items: flex-start;
    gap: 8px;
    padding: 6px 0;
    font-size: 13px;
  }
  .font-item + .font-item { border-top: 1px solid var(--border); }
  .font-item .font-meta { flex: 1; min-width: 0; }
  .font-item .font-name { font-weight: 500; }
  .font-item .font-sub {
    font-size: 11px;
    color: var(--muted);
    margin-top: 2px;
  }
  .font-item .font-action button {
    font-size: 12px;
    padding: 3px 8px;
    border: 1px solid var(--border);
    background: var(--panel);
  }
  .font-item .font-check {
    color: var(--ok);
    font-weight: bold;
    width: 14px;
    flex: 0 0 auto;
    text-align: center;
  }
  .font-progress {
    width: 100%;
    height: 4px;
    background: var(--border);
    border-radius: 2px;
    overflow: hidden;
    margin-top: 4px;
  }
  .font-progress > div {
    height: 100%;
    background: var(--accent);
    width: 0%;
    transition: width 80ms linear;
  }
  .font-error {
    color: var(--error-fg);
    font-size: 11px;
    margin-top: 4px;
  }

</style>
</head>
<body>
<header>
  <h1>Typst<span class="accent">UML</span></h1>
  <label for="examples">Example</label>
  <select id="examples">
    <option value="json">JSON</option>
    <option value="yaml">YAML</option>
    <option value="sequence">Sequence</option>
    <option value="wbs">WBS</option>
    <option value="mindmap">Mind map</option>
  </select>
  <div class="spacer"></div>
  <span id="status" data-state="busy">loading…</span>
</header>

<main>
  <section class="pane">
    <textarea id="editor" spellcheck="false"></textarea>
    <pre id="error"></pre>
  </section>
  <section class="pane">
    <div id="output"></div>
    <div id="toolbar" role="toolbar" aria-label="Render controls">
      <div class="format-group" role="group" aria-label="Output format">
        <button data-format="svg" class="active">SVG</button>
        <button data-format="png">PNG</button>
        <button data-format="pdf">PDF</button>
      </div>
      <!-- Scale picker is PNG-only — hidden when the active format is SVG/PDF. -->
      <select id="pngScale" class="png-only" hidden title="PNG resolution">
        <option value="1">1× — 72 DPI</option>
        <option value="2" selected>2× — 144 DPI</option>
        <option value="3">3× — 216 DPI</option>
        <option value="4">4× — 288 DPI</option>
      </select>
      <span class="divider"></span>
      <span class="popover-anchor">
        <button id="fontsBtn" title="Load additional fonts">Fonts</button>
        <div id="fontsPopover" class="popover" role="dialog" aria-label="Fonts"></div>
      </span>
      <span class="divider"></span>
      <span class="zoom">
        <button id="zoomOut" title="Zoom out">−</button>
        <span id="zoomLabel">100%</span>
        <button id="zoomIn" title="Zoom in">+</button>
      </span>
      <span class="divider"></span>
      <button id="download" title="Download current format">Download</button>
    </div>
  </section>
</main>

<script type="module">
// `./build.sh` writes ./pkg/ next to this file (cargo + wasm-bindgen + wasm-opt).
// The default export is the module loader; named exports are our bindings.
import init, { renderSvg, renderPng, renderPdf, addFont } from "./pkg/typstuml_wasm.js";

// Extra fonts the user can fetch on demand (kept out of the .wasm to keep the
// base download small — Latin-only rendering doesn't pay for these). Picked
// to cover the common "render fails on non-Latin glyphs" complaint. URLs are
// pinned jsdelivr mirrors of upstream GitHub repos. To swap in a different
// font, change `url` here and bump `id` to invalidate the IndexedDB cache.
const AVAILABLE_FONTS = [
  {
    id: "noto-sans-sc-subset-2024",
    name: "Noto Sans SC",
    description: "Simplified Chinese — required to render 中文 glyphs",
    url: "https://cdn.jsdelivr.net/gh/notofonts/noto-cjk@main/Sans/SubsetOTF/SC/NotoSansSC-Regular.otf",
    approxBytes: 8_331_336,
  },
  {
    // COLRv1 variant — half the size of the legacy CBDT NotoColorEmoji.ttf
    // (5 MB vs 10 MB) and renders as vector paths in SVG output instead of
    // embedded PNGs. Typst >=0.12 reads COLRv1 directly.
    id: "noto-color-emoji-colrv1-2024",
    name: "Noto Color Emoji",
    description: "Color emoji (COLRv1) — for 😀 🎨 ✅ etc.",
    url: "https://cdn.jsdelivr.net/gh/googlefonts/noto-emoji@main/fonts/Noto-COLRv1.ttf",
    approxBytes: 4_991_984,
  },
];

const BUILTIN_FONTS = [
  { name: "Libertinus Serif", description: "Body text (embedded)" },
  { name: "DejaVu Sans Mono", description: "Code & monospace (embedded)" },
];

// IndexedDB cache so repeat visits don't re-download CJK / emoji fonts.
// LocalStorage caps at 5 MB which isn't enough; IndexedDB has multi-MB
// allowances and stores binary efficiently. One object store, keyed by id.
const FONT_DB_NAME = "typstuml-fonts";
const FONT_DB_VERSION = 1;
const FONT_STORE = "fonts";

function openFontDB() {
  return new Promise((resolve) => {
    if (!window.indexedDB) return resolve(null); // private mode etc.
    const req = indexedDB.open(FONT_DB_NAME, FONT_DB_VERSION);
    req.onupgradeneeded = () => {
      req.result.createObjectStore(FONT_STORE, { keyPath: "id" });
    };
    req.onsuccess = () => resolve(req.result);
    req.onerror = () => resolve(null); // degrade silently — UX still works
  });
}

function dbReq(db, mode, fn) {
  return new Promise((resolve, reject) => {
    if (!db) return resolve(null);
    const tx = db.transaction(FONT_STORE, mode);
    const store = tx.objectStore(FONT_STORE);
    const r = fn(store);
    r.onsuccess = () => resolve(r.result);
    r.onerror = () => reject(r.error);
  });
}

const fontCache = {
  db: null,
  async init() { this.db = await openFontDB(); },
  list() { return dbReq(this.db, "readonly", (s) => s.getAll()); },
  get(id) { return dbReq(this.db, "readonly", (s) => s.get(id)); },
  put(entry) { return dbReq(this.db, "readwrite", (s) => s.put(entry)); },
  remove(id) { return dbReq(this.db, "readwrite", (s) => s.delete(id)); },
};

// Track which AVAILABLE_FONTS ids have been pushed into the wasm font book
// this session. Used by the popover to decide between "Load" / "Remove".
const loadedFontIds = new Set();
// In-flight load tasks keyed by font id: { progress, error }.
const fontLoads = new Map();

const EXAMPLES = {
  json: `@startjson
{
  "project": "TypstUML",
  "language": "Rust",
  "targets": ["native", "wasm"],
  "offline": true
}
@endjson`,
  yaml: `@startyaml
project: TypstUML
pipeline:
  - parser
  - ir
  - codegen
  - runtime
formats: [svg, pdf, png]
@endyaml`,
  sequence: `@startuml
Alice -> Bob: Authentication Request
Bob --> Alice: Authentication Response
Alice -> Bob: Another request
Bob --> Alice: Another response
@enduml`,
  wbs: `@startwbs
* TypstUML
** Parser
*** PlantUML scanner
*** Dispatcher
** Codegen
** Runtime
*** Typst world
*** SVG / PDF / PNG
@endwbs`,
  mindmap: `@startmindmap
* Diagram types
** Sequence
** JSON
** YAML
** WBS
** Mind map
@endmindmap`,
};

const FORMAT_META = {
  svg: { mime: "image/svg+xml", ext: "svg" },
  png: { mime: "image/png",      ext: "png" },
  pdf: { mime: "application/pdf", ext: "pdf" },
};

const editor = document.getElementById("editor");
const output = document.getElementById("output");
const errorBox = document.getElementById("error");
const statusEl = document.getElementById("status");
const examplesEl = document.getElementById("examples");
const formatGroup = document.querySelector(".format-group");
const pngScaleEl = document.getElementById("pngScale");
const downloadBtn = document.getElementById("download");
const zoomOutBtn = document.getElementById("zoomOut");
const zoomInBtn = document.getElementById("zoomIn");
const zoomLabel = document.getElementById("zoomLabel");
const fontsBtn = document.getElementById("fontsBtn");
const fontsPopover = document.getElementById("fontsPopover");

let ready = false;
let currentFormat = "svg";
// pixels-per-pt for PNG output. 2 → ~144 DPI (retina). Only consulted
// when currentFormat is "png"; SVG/PDF ignore it.
let pngScale = Number(pngScaleEl.value);
// Last successful render — `data` is a string for SVG, Uint8Array for PNG/PDF.
let lastOutput = null;
// Object-URL for the most recent <img>/<iframe>; revoked on each new render.
let lastBlobUrl = null;

function setStatus(text, state = "idle") {
  statusEl.textContent = text;
  statusEl.dataset.state = state;
}

function updateDownloadAvailability() {
  // Disabled until we have a successful render to save. Label stays
  // "Download" — the user already sees the current format in the toggle.
  downloadBtn.disabled = !lastOutput;
}

function clearBlobUrl() {
  if (lastBlobUrl) {
    URL.revokeObjectURL(lastBlobUrl);
    lastBlobUrl = null;
  }
}

function showOutput(format, data) {
  clearBlobUrl();
  output.classList.toggle("pdf-mode", format === "pdf");
  // Zoom only meaningfully applies to SVG/PNG — PDF iframes have their own UI.
  zoomOutBtn.disabled = zoomInBtn.disabled = (format === "pdf");

  if (format === "svg") {
    output.innerHTML = data;
  } else {
    const { mime } = FORMAT_META[format];
    const blob = new Blob([data], { type: mime });
    lastBlobUrl = URL.createObjectURL(blob);
    output.innerHTML = format === "png"
      ? `<img src="${lastBlobUrl}" alt="rendered diagram">`
      : `<iframe src="${lastBlobUrl}" title="PDF preview"></iframe>`;
  }
}

function render() {
  if (!ready) return;
  const source = editor.value;
  const format = currentFormat;
  setStatus("rendering…", "busy");
  // Yield once so the status text actually paints before the (possibly
  // multi-second) wasm call blocks the main thread.
  requestAnimationFrame(() => {
    try {
      let data;
      if (format === "svg") data = renderSvg(source);
      else if (format === "png") data = renderPng(source, pngScale);
      else if (format === "pdf") data = renderPdf(source);
      lastOutput = { format, data };
      showOutput(format, data);
      errorBox.style.display = "none";
      setStatus("rendered", "ok");
    } catch (err) {
      errorBox.textContent = String(err.message ?? err);
      errorBox.style.display = "block";
      setStatus("error", "error");
    }
    updateDownloadAvailability();
  });
}

// Debounced auto-render while typing.
let timer = null;
function scheduleRender() {
  setStatus("typing…", "busy");
  clearTimeout(timer);
  timer = setTimeout(render, 400);
}

editor.addEventListener("input", scheduleRender);

// Format toggle — segmented control. One button at a time gets `.active`.
// PNG-only sub-controls (currently just the scale picker) appear or hide
// based on the selected format.
formatGroup.addEventListener("click", (e) => {
  const btn = e.target.closest("button[data-format]");
  if (!btn || btn.classList.contains("active")) return;
  formatGroup.querySelectorAll("button").forEach((b) =>
    b.classList.toggle("active", b === btn));
  currentFormat = btn.dataset.format;
  pngScaleEl.hidden = currentFormat !== "png";
  render();
});

pngScaleEl.addEventListener("change", () => {
  pngScale = Number(pngScaleEl.value);
  // Only re-render if PNG is actually showing — otherwise the user is just
  // pre-setting a value for later.
  if (currentFormat === "png") render();
});

// Zoom: the rendered SVG/PNG is sized to `--zoom`% of the output pane's width,
// so 100% fills the pane and anything larger scrolls.
const ZOOM_STEPS = [25, 50, 75, 100, 150, 200, 300, 400];
let zoomIdx = 3; // 100%
function applyZoom() {
  const z = ZOOM_STEPS[zoomIdx];
  output.style.setProperty("--zoom", z + "%");
  zoomLabel.textContent = z + "%";
}
zoomOutBtn.addEventListener("click", () => {
  zoomIdx = Math.max(0, zoomIdx - 1);
  applyZoom();
});
zoomInBtn.addEventListener("click", () => {
  zoomIdx = Math.min(ZOOM_STEPS.length - 1, zoomIdx + 1);
  applyZoom();
});
applyZoom();

examplesEl.addEventListener("change", () => {
  editor.value = EXAMPLES[examplesEl.value];
  render();
});

// Download the most recently rendered output. The button is disabled until
// `lastOutput` is set, so we don't need to guard against missing data here.
downloadBtn.addEventListener("click", () => {
  if (!lastOutput) return;
  const { format, data } = lastOutput;
  const { mime, ext } = FORMAT_META[format];
  const blob = new Blob([data], { type: mime });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = "diagram." + ext;
  a.click();
  URL.revokeObjectURL(url);
});

// --- Fonts popover ---------------------------------------------------------

function fmtBytes(n) {
  if (n < 1024) return n + " B";
  if (n < 1024 * 1024) return (n / 1024).toFixed(1) + " KB";
  return (n / (1024 * 1024)).toFixed(1) + " MB";
}

function renderFontsPopover() {
  const builtinHtml = BUILTIN_FONTS.map((f) => `
    <div class="font-item">
      <span class="font-check">✓</span>
      <div class="font-meta">
        <div class="font-name">${f.name}</div>
        <div class="font-sub">${f.description}</div>
      </div>
    </div>`).join("");

  const availableHtml = AVAILABLE_FONTS.map((f) => {
    const loaded = loadedFontIds.has(f.id);
    const load = fontLoads.get(f.id);
    const right = loaded
      ? `<button data-action="remove" data-id="${f.id}">Remove</button>`
      : load
      ? "" // progress bar replaces the button while loading
      : `<button data-action="load" data-id="${f.id}">Load</button>`;
    const progress = load
      ? `<div class="font-progress"><div style="width:${load.progress}%"></div></div>` +
        (load.error ? `<div class="font-error">${load.error}</div>` : "")
      : "";
    return `
    <div class="font-item">
      <span class="font-check">${loaded ? "✓" : ""}</span>
      <div class="font-meta">
        <div class="font-name">${f.name}</div>
        <div class="font-sub">${f.description} · ~${fmtBytes(f.approxBytes)}</div>
        ${progress}
      </div>
      <div class="font-action">${right}</div>
    </div>`;
  }).join("");

  fontsPopover.innerHTML =
    `<h3>Built-in</h3>${builtinHtml}` +
    `<h3>Available</h3>${availableHtml}`;
}

// Stream the font bytes so the popover can show real progress instead of a
// spinner. `Content-Length` isn't always sent for compressed transfers; fall
// back to the declared `approxBytes` for the progress denominator so the bar
// still moves rather than jumping 0→100 at the end.
async function fetchFontBytes(font, onProgress) {
  const res = await fetch(font.url);
  if (!res.ok) throw new Error(`HTTP ${res.status}`);
  const total = Number(res.headers.get("content-length")) || font.approxBytes;
  const reader = res.body.getReader();
  const chunks = [];
  let received = 0;
  while (true) {
    const { done, value } = await reader.read();
    if (done) break;
    chunks.push(value);
    received += value.length;
    onProgress(Math.min(99, (received / total) * 100));
  }
  const buf = new Uint8Array(received);
  let off = 0;
  for (const c of chunks) { buf.set(c, off); off += c.length; }
  return buf;
}

async function loadFont(id) {
  const font = AVAILABLE_FONTS.find((f) => f.id === id);
  if (!font || loadedFontIds.has(id) || fontLoads.has(id)) return;

  fontLoads.set(id, { progress: 0, error: null });
  renderFontsPopover();

  try {
    // Prefer cached bytes — saves a round trip on repeat visits.
    let bytes = null;
    const cached = await fontCache.get(id);
    if (cached?.bytes) {
      bytes = new Uint8Array(cached.bytes);
      fontLoads.get(id).progress = 50;
      renderFontsPopover();
    } else {
      bytes = await fetchFontBytes(font, (pct) => {
        const load = fontLoads.get(id);
        if (load) { load.progress = pct; renderFontsPopover(); }
      });
      await fontCache.put({
        id, name: font.name, url: font.url, bytes: bytes.buffer, addedAt: Date.now(),
      });
    }

    const n = addFont(bytes);
    if (n === 0) throw new Error("font file contained no usable faces");
    loadedFontIds.add(id);
    fontLoads.delete(id);
    renderFontsPopover();
    render(); // re-render so newly-supported glyphs show up immediately
  } catch (err) {
    const load = fontLoads.get(id);
    if (load) { load.error = String(err.message ?? err); }
    renderFontsPopover();
    // Keep the error visible for a few seconds, then drop back to "Load".
    setTimeout(() => { fontLoads.delete(id); renderFontsPopover(); }, 4000);
  }
}

async function removeFont(id) {
  // We can't unload from the wasm font book (Typst holds references); only
  // drop the IndexedDB entry so the next page reload doesn't re-load it.
  await fontCache.remove(id);
  loadedFontIds.delete(id);
  renderFontsPopover();
}

// Pull every previously-loaded font from IndexedDB and re-inject into wasm.
// Called once after `init()` resolves, before the first render, so users
// don't see a blank page during font hydration on returning visits.
async function hydrateFontsFromCache() {
  await fontCache.init();
  const entries = (await fontCache.list()) || [];
  for (const entry of entries) {
    // Skip stale entries that no longer match an available font (e.g. URL
    // / id changed between releases).
    if (!AVAILABLE_FONTS.some((f) => f.id === entry.id)) continue;
    try {
      addFont(new Uint8Array(entry.bytes));
      loadedFontIds.add(entry.id);
    } catch (err) {
      console.warn("Failed to hydrate font", entry.id, err);
    }
  }
}

fontsBtn.addEventListener("click", (e) => {
  e.stopPropagation();
  fontsPopover.classList.toggle("open");
});
fontsPopover.addEventListener("click", (e) => {
  e.stopPropagation();
  const btn = e.target.closest("button[data-action]");
  if (!btn) return;
  const { action, id } = btn.dataset;
  if (action === "load") loadFont(id);
  if (action === "remove") removeFont(id);
});
document.addEventListener("click", () => fontsPopover.classList.remove("open"));

renderFontsPopover();

// ---------------------------------------------------------------------------

editor.value = EXAMPLES.json;
updateDownloadAvailability();

init()
  .then(async () => {
    await hydrateFontsFromCache();
    renderFontsPopover();
    ready = true;
    render();
  })
  .catch((err) => {
    setStatus("load failed", "error");
    errorBox.textContent =
      "Failed to load the wasm module.\n" +
      "Build it first:  ./build.sh\n" +
      "and serve this directory over HTTP (not file://).\n\n" +
      String(err);
    errorBox.style.display = "block";
  });
</script>
