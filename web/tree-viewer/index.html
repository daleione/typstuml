<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>TypstUML — interactive mindmap / WBS</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<header>
  <strong>TypstUML tree viewer</strong>
  <span class="hint">click ○ to fold / unfold · ⌘-click folds recursively · drag to pan · ⌘/Ctrl+wheel to zoom</span>
  <span class="spacer"></span>
  <button id="btn-expand-all" title="Expand every node">expand all</button>
  <button id="btn-fit" title="Fit diagram to window">fit</button>
</header>
<main>
  <aside>
    <textarea id="source" spellcheck="false">@startmindmap
title Operating system
* OS
** Engineering
*** Backend
**** Storage
**** Compute
*** Frontend
*** 平台研发
** Marketing
-- Long term
--- Vision
--- Roadmap
-- 研究
--- 分布式系统
--- 形式化验证
@endmindmap</textarea>
    <button id="btn-load">Load</button>
    <div id="status"></div>
  </aside>
  <section id="canvas-wrap">
    <div id="title"></div>
    <svg id="canvas" xmlns="http://www.w3.org/2000/svg">
      <g id="viewport">
        <g id="edges"></g>
        <g id="nodes"></g>
      </g>
    </svg>
  </section>
</main>
<script type="module" src="viewer.js"></script>
</body>
</html>
